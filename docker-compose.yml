services:
  mongodb:
    image: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ""
      MONGO_INITDB_ROOT_PASSWORD: ""

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./monitoring/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - 9091:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./monitoring/local/grafana-datasource.yml:/etc/grafana/provisioning/datasources/local.yml:ro,Z
      - ./monitoring/local/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/local.yml:ro,Z
      - ./monitoring/fly-grafana-dashboard.json:/etc/grafana/provisioning/dashboards/fly-grafana-dashboard.json:ro,Z
