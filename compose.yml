services:
  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: ""
      MONGO_INITDB_ROOT_PASSWORD: ""
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/fodinha-card-definitions;
      /usr/bin/mc anonymous set download local/fodinha-card-definitions;
      "

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - ./docs/monitoring/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - 9091:3000
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./docs/monitoring/local/grafana-datasource.yml:/etc/grafana/provisioning/datasources/local.yml:ro,Z
      - ./docs/monitoring/local/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/local.yml:ro,Z
      - ./docs/monitoring/fly-grafana-dashboard.json:/etc/grafana/provisioning/dashboards/fly-grafana-dashboard.json:ro,Z

volumes:
  mongo_data:
  minio_data:
