global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "oh-hell-api"
    scrape_interval: 1s
    scrape_timeout: 800ms
    metrics_path: "/metrics"
    static_configs:
      - targets: ["host.containers.internal:3000"]
        labels:
          app: "oh_hell"
          region: "local"
